name: Auto Version Bump

on:
  push:
    branches: [master]
    paths:
      - 'burrow/**'
      - 'tests/**'

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if the commit was made by the bot (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip-bump]') && !contains(github.event.head_commit.author.name, 'github-actions')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv venv && uv pip install -e ".[dev]"

      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qiE "^feat(\(|:)|BREAKING"; then
            echo "part=minor" >> $GITHUB_OUTPUT
          else
            echo "part=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: version
        run: |
          uv run python3 -c "
          from burrow.updater import bump_version_files
          new = bump_version_files('${{ steps.bump.outputs.part }}')
          print(f'new_version={new}')
          " >> $GITHUB_OUTPUT

      - name: Run tests with new version
        run: uv run pytest tests/ -v

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml burrow/protocol.py .claude-plugin/plugin.json tests/test_protocol.py
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip-bump]"
          git tag "v${{ steps.version.outputs.new_version }}" || true
          git push origin master --tags
