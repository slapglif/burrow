name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: macos-13
            target: macos-x64
            ext: ""
          - os: macos-14
            target: macos-arm64
            ext: ""
          - os: windows-latest
            target: windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv pip install -e ".[build]" --system
      - name: Build binary
        run: pyinstaller --onefile --name burrow-${{ matrix.target }} burrow/__main__.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: burrow-${{ matrix.target }}
          path: dist/burrow-${{ matrix.target }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
